<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    version="1.1" baseProfile="full"
    width="200mm" height="200mm">
    <title>Address resolving by TLB</title>
    <desc>Find physical/real RAM address for virtual address.</desc>
    <!-- by https://de.wikipedia.org/wiki/Benutzer:Arilou -->

	<rect x="300" y= "25" width="200" height="100" fill="#CCCCCC" />
	<rect x="300" y="225" width="200" height="100" fill="#CCCCCC" />
	<rect x="300" y="425" width="200" height="100" fill="#CCCCCC" />

	<line x1="200" y1= "75" x2="300" y2= "75" stroke= "black" />
	<line x1="500" y1= "75" x2="600" y2= "75" stroke= "black" />
	<line x1="250" y1= "75" x2="250" y2="175" stroke= "black" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1, 5" />
	<line x1="250" y1="175" x2="250" y2="275" stroke= "black" />
	<line x1="250" y1="275" x2="300" y2="275" stroke= "black" />
	<line x1="375" y1="125" x2="375" y2="175" stroke= "black" />
	<line x1="425" y1="125" x2="425" y2="175" stroke= "black" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1, 5" />
	<line x1="375" y1="175" x2="250" y2="175" stroke= "black" />
	<line x1="425" y1="175" x2="550" y2="175" stroke= "black" />
	<line x1="375" y1="325" x2="375" y2="425" stroke= "black" />
	<line x1="425" y1="325" x2="425" y2="375" stroke= "black" />
	<line x1="425" y1="375" x2="550" y2="375" stroke= "black" />
	<line x1="500" y1="475" x2="550" y2="475" stroke= "black" />
	<line x1="550" y1="475" x2="550" y2="175" stroke= "black" />
	<line x1="500" y1="275" x2="550" y2="275" stroke= "black" />

	<polygon points="295, 70 300, 75 295, 80" fill="black" stroke="black" />
	<polygon points="295,270 300,275 295,280" fill="black" stroke="black" />
	<polygon points="250,175 255,170 255,180" fill="black" stroke="black" />
	<polygon points="595, 70 600, 75 595, 80" fill="black" stroke="black" />
	<polygon points="425,125 420,130 430,130" fill="black" stroke="black" />
	<polygon points="545,270 545,280 550,275" fill="black" stroke="black" />
	<polygon points="425,325 420,330 430,330" fill="black" stroke="black" />
	<polygon points="375,425 370,420 380,420" fill="black" stroke="black" />

	<text x="100" y= "80">virtual address</text>
	<text x="610" y= "80">physical address</text>
	<text x="350" y= "80" textLength="100" >TLB</text>
	<text x="510" y= "70">TLB hit</text>
	<text x="305" y="150">TLB miss</text>
	<text x="435" y="150">TLB update/write</text>
	<text x="350" y="280" textLength="100" >page table</text>
	<text x="510" y="268">page</text>
	<text x="510" y="288">table</text>
	<text x="510" y="308">hit</text>
	<text x="270" y="350">page table miss</text>
	<text x="450" y="370">page table</text>
	<text x="450" y="390">update/write</text>
	<text x="350" y="480" textLength="100" >page file (disk)</text>
</svg>
