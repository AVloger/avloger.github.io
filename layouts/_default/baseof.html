<!doctype html>
<html lang="{{ site.LanguageCode }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fbfaf7;
        --text: #1f2933;
        --muted: #697386;
        --line: #e6e1d8;
        --accent: #0f4c81;
        --code: #f4f0e8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        line-height: 1.75;
      }
      a { color: var(--accent); text-decoration-thickness: 1px; text-underline-offset: 3px; }
      .site-header, .site-footer { max-width: 880px; margin: 0 auto; padding: 28px 20px; }
      .site-header { border-bottom: 1px solid var(--line); }
      .brand { color: var(--text); font-size: 22px; font-weight: 750; text-decoration: none; }
      main { max-width: 880px; margin: 0 auto; padding: 28px 20px 56px; }
      article { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: clamp(22px, 4vw, 44px); }
      h1, h2, h3 { line-height: 1.3; letter-spacing: 0; }
      h1 { font-size: clamp(30px, 5vw, 46px); margin: 0 0 18px; }
      h2 { margin-top: 44px; padding-top: 12px; border-top: 1px solid var(--line); }
      h3 { margin-top: 30px; }
      .meta { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
      img { display: block; max-width: 100%; height: auto; margin: 28px auto; border-radius: 8px; }
      pre { overflow-x: auto; padding: 16px; background: var(--code); border-radius: 8px; }
      code { background: var(--code); border-radius: 4px; padding: 2px 5px; }
      pre code { padding: 0; background: transparent; }
      blockquote { margin: 24px 0; padding-left: 16px; border-left: 4px solid var(--line); color: var(--muted); }
      .post-list { list-style: none; padding: 0; margin: 0; }
      .post-list li { padding: 18px 0; border-bottom: 1px solid var(--line); }
      .post-list h2 { border: 0; margin: 0 0 8px; padding: 0; font-size: 22px; }
      .summary { color: var(--muted); margin: 0; }
      .site-footer { color: var(--muted); border-top: 1px solid var(--line); font-size: 14px; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ site.Home.RelPermalink }}">{{ site.Title }}</a>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
      <span>{{ site.Title }}</span>
    </footer>
  </body>
</html>
