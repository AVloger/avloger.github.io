{{ define "main" }}
  <h1>{{ if .IsHome }}最新文章{{ else }}{{ .Title }}{{ end }}</h1>
  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
      <li>
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <div class="meta">{{ .Date.Format "2006-01-02" }}</div>
        {{ with .Summary }}<p class="summary">{{ . }}</p>{{ end }}
      </li>
    {{ end }}
  </ul>
{{ end }}
